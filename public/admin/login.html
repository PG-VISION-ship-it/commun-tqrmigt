<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="login_title">Connexion - Administration Commune de Tarmigt</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Tajawal:wght@200;300;400;500;700;800;900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
  <script src="/admin/js/translations.js"></script>
  <script src="/admin/js/i18n.js"></script>
</head>
<body data-i18n-page="login_title">
  <div class="login-page">
    <div class="login-box">
      <div class="logo">
        <img src="/tarmigt-logo.svg" alt="Logo">
        <h1 data-i18n="commune_name">Commune de Tarmigt</h1>
        <p data-i18n="commune_sub">Espace d'administration</p>
      </div>
      <div class="login-error" id="login-error"></div>
      <form id="login-form">
        <div class="form-group">
          <label for="username" data-i18n="login_username_label">Nom d'utilisateur</label>
          <input type="text" id="username" name="username" data-i18n-ph="login_username_ph" placeholder="Entrez votre identifiant" required autocomplete="username">
        </div>
        <div class="form-group">
          <label for="password" data-i18n="login_password_label">Mot de passe</label>
          <div class="pw-wrapper">
            <input type="password" id="password" name="password" data-i18n-ph="login_password_ph" placeholder="Entrez votre mot de passe" required autocomplete="current-password">
            <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Afficher le mot de passe">
              <svg class="pw-eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="pw-eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <button type="submit" class="btn-login" id="btn-login" data-i18n="login_btn">Se connecter</button>
      </form>
    </div>
  </div>
  <script>
    (function() {
      /* apply translations to static elements */
      I18n.translatePage();

      var token = localStorage.getItem('admin_token');
      if (token) { window.location.href = '/admin/index.html'; return; }

      var form = document.getElementById('login-form');
      var errorDiv = document.getElementById('login-error');
      var btn = document.getElementById('btn-login');
      var pwInput = document.getElementById('password');
      var pwToggle = document.getElementById('pw-toggle');
      var eyeOpen = pwToggle.querySelector('.pw-eye-open');
      var eyeClosed = pwToggle.querySelector('.pw-eye-closed');

      pwToggle.addEventListener('click', function() {
        var isPassword = pwInput.type === 'password';
        pwInput.type = isPassword ? 'text' : 'password';
        eyeOpen.style.display = isPassword ? 'none' : '';
        eyeClosed.style.display = isPassword ? '' : 'none';
        pwInput.focus();
      });

      form.addEventListener('submit', function(e) {
        e.preventDefault();
        var username = document.getElementById('username').value.trim();
        var password = document.getElementById('password').value;
        if (!username || !password) {
          errorDiv.textContent = I18n.t('login_fill_all');
          errorDiv.style.display = 'block';
          return;
        }
        btn.disabled = true;
        btn.textContent = I18n.t('login_connecting');
        errorDiv.style.display = 'none';

        fetch('/api/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username: username, password: password })
        })
        .then(function(res) { return res.json().then(function(data) { return { ok: res.ok, data: data }; }); })
        .then(function(result) {
          if (!result.ok) {
            errorDiv.textContent = result.data.error || I18n.t('login_bad_credentials');
            errorDiv.style.display = 'block';
            btn.disabled = false;
            btn.textContent = I18n.t('login_btn');
            return;
          }
          localStorage.setItem('admin_token', result.data.token);
          localStorage.setItem('admin_user', JSON.stringify(result.data.user));
          window.location.href = '/admin/index.html';
        })
        .catch(function() {
          errorDiv.textContent = I18n.t('login_server_error');
          errorDiv.style.display = 'block';
          btn.disabled = false;
          btn.textContent = I18n.t('login_btn');
        });
      });
    })();
  </script>
</body>
</html>
