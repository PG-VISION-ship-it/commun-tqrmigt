<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="usr_title">Utilisateurs - Administration</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Tajawal:wght@200;300;400;500;700;800;900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <script src="js/translations.js"></script>
  <script src="js/i18n.js"></script>
</head>
<body data-i18n-page="usr_title">
  <div class="admin-wrapper">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <header class="topbar" id="topbar"></header>
      <div class="content">
        <div class="page-header">
          <h2 data-i18n="usr_heading">Gestion des utilisateurs</h2>
          <p data-i18n="usr_subtitle">Creer, modifier et supprimer des comptes administrateurs</p>
        </div>
        <div class="toolbar">
          <div></div>
          <button class="btn btn-primary" onclick="openModal()" data-i18n="usr_new_btn">+ Nouvel utilisateur</button>
        </div>
        <div class="card">
          <div class="card-body">
            <div class="table-responsive">
              <table>
                <thead><tr><th data-i18n="usr_th_name">Nom</th><th data-i18n="usr_th_username">Utilisateur</th><th data-i18n="usr_th_email">Email</th><th data-i18n="usr_th_role">Role</th><th data-i18n="usr_th_created">Cree le</th><th data-i18n="usr_th_actions">Actions</th></tr></thead>
                <tbody id="users-table"><tr><td colspan="6" class="loading"><div class="spinner"></div></td></tr></tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modal-title" data-i18n="usr_modal_new">Nouvel utilisateur</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body">
        <div class="alert" id="form-alert"></div>
        <form id="user-form">
          <input type="hidden" id="edit-id">
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="usr_label_name">Nom complet *</label>
              <input type="text" id="full_name" required>
            </div>
            <div class="form-group">
              <label data-i18n="usr_label_username">Nom d'utilisateur *</label>
              <input type="text" id="username" required>
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label data-i18n="usr_label_email">Email *</label>
              <input type="email" id="email" required>
            </div>
            <div class="form-group">
              <label data-i18n="usr_label_role">Role</label>
              <select id="role">
                <option value="admin" data-i18n="usr_role_admin">Administrateur</option>
                <option value="editor" data-i18n="usr_role_editor">Editeur</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label id="password-label" data-i18n="usr_label_password">Mot de passe *</label>
            <input type="password" id="password" minlength="8">
            <div class="hint" id="password-hint" data-i18n="usr_hint_min">Minimum 6 caracteres</div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeModal()" data-i18n="cancel">Annuler</button>
        <button class="btn btn-primary" id="btn-save" onclick="saveUser()" data-i18n="save">Enregistrer</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="delete-overlay">
    <div class="modal" style="max-width:400px">
      <div class="modal-header"><h3 data-i18n="usr_delete_title">Confirmer la suppression</h3><button class="modal-close" onclick="closeDeleteModal()">&times;</button></div>
      <div class="modal-body"><p data-i18n="usr_delete_confirm">Voulez-vous vraiment supprimer cet utilisateur ?</p><p id="delete-name" style="font-weight:600;margin-top:8px"></p></div>
      <div class="modal-footer">
        <button class="btn btn-outline" onclick="closeDeleteModal()" data-i18n="cancel">Annuler</button>
        <button class="btn btn-danger" id="btn-confirm-delete" onclick="confirmDelete()" data-i18n="delete">Supprimer</button>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    var deleteId = null;

    if (!initAdminPage('users', 'usr_title')) throw new Error('Auth required');

    loadUsers();

    function loadUsers() {
      AdminAPI.get('users').then(function(users) {
        var tbody = document.getElementById('users-table');
        if (users.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="table-empty">' + I18n.t('usr_empty') + '</td></tr>'; return; }
        tbody.innerHTML = users.map(function(u) {
          var currentUser = AdminAuth.getUser();
          var isSelf = currentUser && currentUser.id === u.id;
          return '<tr>' +
            '<td>' + AdminUtils.escapeHtml(u.full_name) + '</td>' +
            '<td>' + AdminUtils.escapeHtml(u.username) + '</td>' +
            '<td>' + AdminUtils.escapeHtml(u.email) + '</td>' +
            '<td>' + (u.role === 'admin' ? '<span style="color:var(--primary)">' + I18n.t('usr_role_admin_short') + '</span>' : '<span style="color:var(--info)">' + I18n.t('usr_role_editor_short') + '</span>') + '</td>' +
            '<td>' + AdminUtils.formatDate(u.created_at) + '</td>' +
            '<td><div class="btn-group">' +
            '<button class="btn-icon" title="' + I18n.t('usr_title_attr_edit') + '" onclick="editUser(' + u.id + ')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>' +
            (isSelf ? '' : '<button class="btn-icon" title="' + I18n.t('usr_title_attr_del') + '" onclick="deleteUser(' + u.id + ',\'' + AdminUtils.escapeJsString(u.full_name) + '\')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--danger)"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>') +
            '</div></td></tr>';
        }).join('');
      }).catch(function() { AdminToast(I18n.t('usr_load_error'), 'error'); });
    }

    window.openModal = function() {
      document.getElementById('edit-id').value = '';
      document.getElementById('user-form').reset();
      document.getElementById('modal-title').textContent = I18n.t('usr_modal_new');
      document.getElementById('password').required = true;
      document.getElementById('password-label').textContent = I18n.t('usr_label_password');
      document.getElementById('password-hint').textContent = I18n.t('usr_hint_min');
      document.getElementById('form-alert').className = 'alert';
      document.getElementById('modal-overlay').classList.add('show');
    };

    window.closeModal = function() { document.getElementById('modal-overlay').classList.remove('show'); };

    window.editUser = function(id) {
      AdminAPI.get('users').then(function(users) {
        var u = users.find(function(user) { return user.id === id; });
        if (!u) return;
        document.getElementById('edit-id').value = u.id;
        document.getElementById('full_name').value = u.full_name;
        document.getElementById('username').value = u.username;
        document.getElementById('email').value = u.email;
        document.getElementById('role').value = u.role;
        document.getElementById('password').required = false;
        document.getElementById('password-label').textContent = I18n.t('usr_label_pw_edit');
        document.getElementById('password-hint').textContent = I18n.t('usr_hint_min_edit');
        document.getElementById('modal-title').textContent = I18n.t('usr_modal_edit');
        document.getElementById('form-alert').className = 'alert';
        document.getElementById('modal-overlay').classList.add('show');
      }).catch(function() { AdminToast(I18n.t('usr_load_error'), 'error'); });
    };

    window.saveUser = function() {
      var id = document.getElementById('edit-id').value;
      var data = {
        full_name: document.getElementById('full_name').value.trim(),
        username: document.getElementById('username').value.trim(),
        email: document.getElementById('email').value.trim(),
        role: document.getElementById('role').value
      };
      var password = document.getElementById('password').value;
      if (password) data.password = password;

      if (!data.full_name || !data.username || !data.email) {
        AdminAlert('form-alert', I18n.t('usr_fill_required'), 'danger');
        return;
      }
      if (!id && !password) {
        AdminAlert('form-alert', I18n.t('usr_pw_required_new'), 'danger');
        return;
      }
      if (password && password.length < 8) {
        AdminAlert('form-alert', I18n.t('usr_pw_too_short'), 'danger');
        return;
      }

      var btn = document.getElementById('btn-save');
      btn.disabled = true;
      var promise = id ? AdminAPI.put('users/' + id, data) : AdminAPI.post('users', data);
      promise.then(function() {
        AdminToast(id ? I18n.t('usr_updated') : I18n.t('usr_created'), 'success');
        closeModal();
        loadUsers();
      }).catch(function(err) {
        AdminAlert('form-alert', err.error || I18n.t('usr_save_error'), 'danger');
      }).finally(function() { btn.disabled = false; });
    };

    window.deleteUser = function(id, name) {
      deleteId = id;
      document.getElementById('delete-name').textContent = name;
      document.getElementById('delete-overlay').classList.add('show');
    };
    window.closeDeleteModal = function() { document.getElementById('delete-overlay').classList.remove('show'); deleteId = null; };
    window.confirmDelete = function() {
      if (!deleteId) return;
      AdminAPI.del('users/' + deleteId).then(function() {
        AdminToast(I18n.t('usr_deleted'), 'success');
        closeDeleteModal();
        loadUsers();
      }).catch(function(err) { AdminToast(err.error || I18n.t('usr_delete_error'), 'error'); });
    };
  </script>
</body>
</html>
