<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="dash_title">Tableau de bord - Administration</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Tajawal:wght@200;300;400;500;700;800;900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
  <script src="/admin/js/translations.js"></script>
  <script src="/admin/js/i18n.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>
<body data-i18n-page="dash_title">
  <div class="admin-wrapper">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <header class="topbar" id="topbar"></header>
      <div class="content">
        <div class="page-header">
          <h2 data-i18n="dash_title">Tableau de bord</h2>
          <p data-i18n="dash_subtitle">Vue d'ensemble de la commune</p>
        </div>

        <div class="stats-grid" id="stats-grid">
          <div class="stat-card"><div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 20H5a2 2 0 01-2-2V6a2 2 0 012-2h10a2 2 0 012 2v1m2 13a2 2 0 01-2-2V7m2 13a2 2 0 002-2V9a2 2 0 00-2-2h-2"/></svg></div><div class="stat-info"><h3 id="stat-news">-</h3><p data-i18n="dash_news_label">Actualites</p></div></div>
          <div class="stat-card"><div class="stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg></div><div class="stat-info"><h3 id="stat-services">-</h3><p data-i18n="dash_services_label">Services</p></div></div>
          <div class="stat-card"><div class="stat-icon orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div><div class="stat-info"><h3 id="stat-messages">-</h3><p data-i18n="dash_messages_label">Messages</p></div></div>
          <div class="stat-card"><div class="stat-icon purple"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg></div><div class="stat-info"><h3 id="stat-unread">-</h3><p data-i18n="dash_unread_label">Non lus</p></div></div>
        </div>

        <div class="charts-grid">
          <div class="card">
            <div class="card-header"><h3 data-i18n="dash_news_by_month">Actualites par mois</h3></div>
            <div class="chart-body"><canvas id="chart-news-month"></canvas></div>
          </div>
          <div class="card">
            <div class="card-header"><h3 data-i18n="dash_services_by_month">Services crees par mois</h3></div>
            <div class="chart-body"><canvas id="chart-services-month"></canvas></div>
          </div>
          <div class="card">
            <div class="card-header"><h3 data-i18n="dash_msg_by_month">Messages par mois</h3></div>
            <div class="chart-body"><canvas id="chart-messages-month"></canvas></div>
          </div>
          <div class="card">
            <div class="card-header"><h3 data-i18n="dash_services_by_cat">Services par categorie</h3></div>
            <div class="chart-body"><canvas id="chart-services-cat"></canvas></div>
          </div>
        </div>

        <div class="dashboard-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:24px">
          <div class="card">
            <div class="card-header"><h3 data-i18n="dash_recent_news">Actualites recentes</h3><a href="/admin/actualites.html" class="btn btn-outline btn-sm" data-i18n="dash_see_all">Voir tout</a></div>
            <div class="card-body">
              <div class="table-responsive">
                <table>
                  <thead><tr><th data-i18n="dash_th_title">Titre</th><th data-i18n="dash_th_date">Date</th><th data-i18n="dash_th_status">Etat</th></tr></thead>
                  <tbody id="recent-news"><tr><td colspan="3" class="loading"><div class="spinner"></div></td></tr></tbody>
                </table>
              </div>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><h3 data-i18n="dash_recent_messages">Messages recents</h3><a href="/admin/messages.html" class="btn btn-outline btn-sm" data-i18n="dash_see_all">Voir tout</a></div>
            <div class="card-body">
              <div class="table-responsive">
                <table>
                  <thead><tr><th data-i18n="dash_th_from">De</th><th data-i18n="dash_th_subject">Sujet</th><th data-i18n="dash_th_status">Etat</th></tr></thead>
                  <tbody id="recent-messages"><tr><td colspan="3" class="loading"><div class="spinner"></div></td></tr></tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="/admin/js/admin.js"></script>
  <script>
    (function() {
      if (!initAdminPage('dashboard', 'dash_title')) return;
      loadStats();

      var charts = {};

      var GREEN = '#1D4B43';
      var GREEN_LIGHT = 'rgba(29,75,67,0.15)';
      var TERRACOTTA = '#C1502E';
      var TERRACOTTA_LIGHT = 'rgba(193,80,46,0.15)';
      var GOLD = '#D9A441';
      var PALETTE = [GREEN, TERRACOTTA, GOLD, '#1a5c6b', '#5a3d6b', '#7b5294', '#248a9e', '#a54325', '#c49538', '#14505c'];

      var chartDefaults = {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { font: { family: '"Work Sans",sans-serif', size: 12 } } },
          y: { beginAtZero: true, grid: { color: 'rgba(29,75,67,0.06)' }, ticks: { font: { family: '"Work Sans",sans-serif', size: 12 }, precision: 0 } }
        }
      };

      function showEmpty(id, msg) {
        var el = document.getElementById(id);
        if (!el) return;
        el.parentElement.innerHTML = '<div class="chart-empty"><p>' + msg + '</p></div>';
      }

      function loadStats() {
        AdminAPI.get('stats').then(function(d) {
          document.getElementById('stat-news').textContent = d.actualites.total;
          document.getElementById('stat-services').textContent = d.services.total;
          document.getElementById('stat-messages').textContent = d.contacts.total;
          document.getElementById('stat-unread').textContent = d.contacts.unread;

          var newsBody = document.getElementById('recent-news');
          if (d.recentNews.length === 0) { newsBody.innerHTML = '<tr><td colspan="3" class="table-empty">' + I18n.t('dash_no_news') + '</td></tr>'; }
          else {
            newsBody.innerHTML = d.recentNews.map(function(n) {
              return '<tr><td>' + AdminUtils.escapeHtml(AdminUtils.truncate(n.titre_fr, 40)) + '</td><td>' + AdminUtils.formatDate(n.date_publication) + '</td><td>' + (n.est_publie ? '<span style="color:var(--success)">' + I18n.t('dash_published') + '</span>' : '<span style="color:var(--warning)">' + I18n.t('dash_draft') + '</span>') + '</td></tr>';
            }).join('');
          }

          var msgBody = document.getElementById('recent-messages');
          if (d.recentContacts.length === 0) { msgBody.innerHTML = '<tr><td colspan="3" class="table-empty">' + I18n.t('dash_no_message') + '</td></tr>'; }
          else {
            msgBody.innerHTML = d.recentContacts.map(function(m) {
              return '<tr><td>' + AdminUtils.escapeHtml(AdminUtils.truncate(m.name, 25)) + '</td><td>' + AdminUtils.escapeHtml(AdminUtils.truncate(m.subject, 30)) + '</td><td>' + (m.is_read ? '<span style="color:var(--text-light)">' + I18n.t('dash_read') + '</span>' : '<span style="color:var(--danger)">' + I18n.t('dash_unread') + '</span>') + '</td></tr>';
            }).join('');
          }

          renderCharts(d);
        }).catch(function() {
          document.getElementById('stat-news').textContent = '0';
          document.getElementById('stat-services').textContent = '0';
          document.getElementById('stat-messages').textContent = '0';
          document.getElementById('stat-unread').textContent = '0';
          document.getElementById('recent-news').innerHTML = '<tr><td colspan="3" class="table-empty">' + I18n.t('dash_load_error') + '</td></tr>';
          document.getElementById('recent-messages').innerHTML = '<tr><td colspan="3" class="table-empty">' + I18n.t('dash_load_error') + '</td></tr>';
          AdminToast(I18n.t('dash_stats_error'), 'error');
        });
      }

      function renderCharts(d) {
        var c = d.charts || {};

        if (c.newsByMonth && c.newsByMonth.length > 0) {
          var labels = c.newsByMonth.map(function(r) {
            var p = r.month.split('-');
            return I18n.monthLabel(parseInt(p[1])) + ' ' + p[0].slice(2);
          });
          charts.news = new Chart(document.getElementById('chart-news-month'), {
            type: 'bar',
            data: { labels: labels, datasets: [{ label: I18n.t('dash_chart_actualites'), data: c.newsByMonth.map(function(r){return r.count}), backgroundColor: GREEN, borderRadius: 4, maxBarThickness: 40 }] },
            options: chartDefaults
          });
        } else { showEmpty('chart-news-month', I18n.t('dash_no_news_now')); }

        if (c.servicesByMonth && c.servicesByMonth.length > 0) {
          var labelsSvc = c.servicesByMonth.map(function(r) {
            var p = r.month.split('-');
            return I18n.monthLabel(parseInt(p[1])) + ' ' + p[0].slice(2);
          });
          charts.servicesMonth = new Chart(document.getElementById('chart-services-month'), {
            type: 'bar',
            data: { labels: labelsSvc, datasets: [{ label: I18n.t('dash_chart_services'), data: c.servicesByMonth.map(function(r){return r.count}), backgroundColor: GOLD, borderRadius: 4, maxBarThickness: 40 }] },
            options: chartDefaults
          });
        } else { showEmpty('chart-services-month', I18n.t('dash_no_service_cat')); }

        if (c.messagesByMonth && c.messagesByMonth.length > 0) {
          var labels2 = c.messagesByMonth.map(function(r) {
            var p = r.month.split('-');
            return I18n.monthLabel(parseInt(p[1])) + ' ' + p[0].slice(2);
          });
          charts.messages = new Chart(document.getElementById('chart-messages-month'), {
            type: 'line',
            data: { labels: labels2, datasets: [{ label: I18n.t('dash_chart_messages'), data: c.messagesByMonth.map(function(r){return r.count}), borderColor: TERRACOTTA, backgroundColor: TERRACOTTA_LIGHT, fill: true, tension: 0.35, pointRadius: 4, pointBackgroundColor: TERRACOTTA }] },
            options: chartDefaults
          });
        } else { showEmpty('chart-messages-month', I18n.t('dash_no_msg_now')); }

        if (c.servicesByCategory && c.servicesByCategory.length > 0) {
          charts.services = new Chart(document.getElementById('chart-services-cat'), {
            type: 'doughnut',
            data: { labels: c.servicesByCategory.map(function(r){return r.categorie}), datasets: [{ data: c.servicesByCategory.map(function(r){return r.count}), backgroundColor: PALETTE.slice(0, c.servicesByCategory.length), borderWidth: 2, borderColor: '#fff' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { font: { family: '"Work Sans",sans-serif', size: 13 }, padding: 12, usePointStyle: true, pointStyle: 'circle' } } } }
          });
        } else { showEmpty('chart-services-cat', I18n.t('dash_no_service_cat')); }
      }
    })();
  </script>
</body>
</html>
