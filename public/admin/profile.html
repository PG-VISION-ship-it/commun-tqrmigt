<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="prof_title">Mon profil - Administration</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Tajawal:wght@200;300;400;500;700;800;900&family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/css/admin.css">
  <script src="/admin/js/translations.js"></script>
  <script src="/admin/js/i18n.js"></script>
</head>
<body data-i18n-page="prof_title">
  <div class="admin-wrapper">
    <div class="sidebar-overlay" id="sidebar-overlay"></div>
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main-content">
      <header class="topbar" id="topbar"></header>
      <div class="content">
        <div class="page-header">
          <h2 data-i18n="prof_heading">Mon profil</h2>
          <p data-i18n="prof_subtitle">Gerer vos informations personnelles</p>
        </div>
        <div class="profile-card">
          <div class="profile-avatar" id="profile-avatar">?</div>
          <div class="profile-info">
            <h3 id="profile-name" data-i18n="loading">Chargement...</h3>
            <p id="profile-role"></p>
            <p id="profile-since" style="font-size:.8rem;color:var(--text-light);margin-top:4px"></p>
          </div>
        </div>
        <div class="dashboard-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:20px">
          <div class="card">
            <div class="card-header"><h3 data-i18n="prof_personal_info">Informations personnelles</h3></div>
            <div class="card-body">
              <div class="alert" id="profile-alert"></div>
              <form id="profile-form">
                <div class="form-group">
                  <label data-i18n="prof_label_name">Nom complet</label>
                  <input type="text" id="full_name" required>
                </div>
                <div class="form-group">
                  <label data-i18n="prof_label_email">Email</label>
                  <input type="email" id="email" required>
                </div>
                <div class="form-actions">
                  <button type="submit" class="btn btn-primary" data-i18n="save">Enregistrer</button>
                </div>
              </form>
            </div>
          </div>
          <div class="card">
            <div class="card-header"><h3 data-i18n="prof_change_password">Changer le mot de passe</h3></div>
            <div class="card-body">
              <div class="alert" id="password-alert"></div>
              <form id="password-form">
                <div class="form-group">
                  <label data-i18n="prof_label_current_pw">Mot de passe actuel</label>
                  <input type="password" id="current_password" required>
                </div>
                <div class="form-group">
                  <label data-i18n="prof_label_new_pw">Nouveau mot de passe</label>
                  <input type="password" id="new_password" required minlength="8">
                  <div class="hint" data-i18n="prof_hint_min">Minimum 6 caracteres</div>
                </div>
                <div class="form-group">
                  <label data-i18n="prof_label_confirm_pw">Confirmer le mot de passe</label>
                  <input type="password" id="confirm_password" required minlength="8">
                </div>
                <div class="form-actions">
                  <button type="submit" class="btn btn-primary" data-i18n="prof_btn_change_pw">Changer le mot de passe</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
  <script src="/admin/js/admin.js"></script>
  <script>
    if (!initAdminPage('profile', 'prof_heading')) throw new Error('Auth required');

    loadProfile();

    function loadProfile() {
      AdminAPI.get('me').then(function(u) {
        document.getElementById('full_name').value = u.full_name;
        document.getElementById('email').value = u.email;
        document.getElementById('profile-name').textContent = u.full_name;
        document.getElementById('profile-role').textContent = I18n.t('prof_role') + u.role;
        document.getElementById('profile-since').textContent = I18n.t('prof_member_since') + AdminUtils.formatDate(u.created_at);
        var parts = u.full_name.split(' ');
        var initials = parts[0].charAt(0).toUpperCase();
        if (parts.length > 1) initials += parts[parts.length - 1].charAt(0).toUpperCase();
        document.getElementById('profile-avatar').textContent = initials;
      }).catch(function() { AdminToast(I18n.t('prof_error'), 'error'); });
    }

    document.getElementById('profile-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var data = { full_name: document.getElementById('full_name').value.trim(), email: document.getElementById('email').value.trim() };
      if (!data.full_name || !data.email) { AdminAlert('profile-alert', I18n.t('prof_fill_all'), 'danger'); return; }
      AdminAPI.put('profile', data).then(function(u) {
        var user = AdminAuth.getUser();
        if (user) { user.full_name = u.full_name; user.email = u.email; localStorage.setItem('admin_user', JSON.stringify(user)); }
        AdminToast(I18n.t('prof_updated'), 'success');
        AdminAlert('profile-alert', I18n.t('prof_updated_ok'), 'success');
        loadProfile();
      }).catch(function(err) { AdminAlert('profile-alert', err.error || I18n.t('prof_error'), 'danger'); });
    });

    document.getElementById('password-form').addEventListener('submit', function(e) {
      e.preventDefault();
      var cp = document.getElementById('current_password').value;
      var np = document.getElementById('new_password').value;
      var cnp = document.getElementById('confirm_password').value;
      if (np !== cnp) { AdminAlert('password-alert', I18n.t('pw_mismatch'), 'danger'); return; }
      if (np.length < 8) { AdminAlert('password-alert', I18n.t('pw_too_short'), 'danger'); return; }
      AdminAPI.put('profile/password', { current_password: cp, new_password: np }).then(function() {
        AdminToast(I18n.t('pw_changed'), 'success');
        AdminAlert('password-alert', I18n.t('pw_changed_ok'), 'success');
        document.getElementById('password-form').reset();
      }).catch(function(err) { AdminAlert('password-alert', err.error || I18n.t('prof_error'), 'danger'); });
    });
  </script>
</body>
</html>
